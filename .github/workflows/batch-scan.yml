name: Batch Scan Repositories

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force reprocess all repos (ignore previous success)'
        type: boolean
        default: false
      jdk:
        description: 'Force specific JDK version'
        type: choice
        options:
          - 'auto'
          - '21'
          - '17'
          - '11'
          - '8'
        default: 'auto'
      cleanup:
        description: 'Remove cloned repos after successful scan'
        type: boolean
        default: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore scan state from cache
        uses: actions/cache@v4
        with:
          path: state/scan-state.json
          key: scan-state-${{ github.ref_name }}
          restore-keys: |
            scan-state-

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq maven gradle

      - name: Mask secrets in logs
        run: |
          echo "::add-mask::${{ secrets.SONAR_TOKEN }}"

      - name: Create projects in SonarCloud
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          chmod +x scripts/create-projects.sh
          ./scripts/create-projects.sh

      - name: Run batch scan
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          chmod +x scripts/batch-scan.sh
          
          # Build command with options
          CMD="./scripts/batch-scan.sh"
          
          if [ "${{ inputs.force }}" = "true" ]; then
            CMD="$CMD --force"
          fi
          
          if [ "${{ inputs.jdk }}" != "auto" ]; then
            CMD="$CMD --jdk ${{ inputs.jdk }}"
          fi
          
          if [ "${{ inputs.cleanup }}" = "true" ]; then
            CMD="$CMD --cleanup"
          fi
          
          echo "Running: $CMD"
          $CMD || true  # Don't fail the workflow on scan failures

      - name: Upload scan logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-logs
          path: logs/
          retention-days: 30

      - name: Upload scan state
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-state
          path: state/scan-state.json
          retention-days: 90

      - name: Display summary
        if: always()
        run: |
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f state/scan-state.json ]; then
            echo "### Repository Status" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Repository | Status | Cloned | Scanned | Build |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|--------|--------|---------|-------|" >> $GITHUB_STEP_SUMMARY
            
            jq -r '.repositories | to_entries[] | "| \(.key) | \(.value.status) | \(.value.clone_timestamp // "N/A") | \(.value.scan_timestamp // "N/A") | \(.value.build_tool // "N/A") \(.value.jdk_version // "") |"' state/scan-state.json >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            TOTAL=$(jq '.repositories | length' state/scan-state.json)
            SUCCESS=$(jq '[.repositories | to_entries[] | select(.value.status == "success")] | length' state/scan-state.json)
            FAILED=$(jq '[.repositories | to_entries[] | select(.value.status == "failed")] | length' state/scan-state.json)
            SKIPPED=$(jq '[.repositories | to_entries[] | select(.value.status == "skipped")] | length' state/scan-state.json)
            
            echo "- Total: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- Successful: $SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "- Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- Skipped: $SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "No scan state file found." >> $GITHUB_STEP_SUMMARY
          fi
