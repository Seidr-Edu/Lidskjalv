name: Shell Quality, Tests, and Image Build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  shell-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate Bash syntax for tracked shell scripts
        run: |
          git ls-files -z '*.sh' | xargs -0 -n1 bash -n

      - name: Run shellcheck on entrypoints and executable scripts
        run: |
          shellcheck -x -e SC1090,SC1091 \
            lidskjalv-service.sh \
            scripts/*.sh \
            scripts/strategies/*.sh \
            tests/*.sh \
            tests/lib/*.sh

  scanner-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq maven gradle git python3

      - name: Ensure entrypoints are executable
        run: |
          chmod +x lidskjalv-service.sh
          chmod +x scripts/*.sh
          chmod +x tests/run.sh

      - name: Run scanner regression suite
        run: |
          bash tests/run.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build service image
        run: |
          docker build -t lidskjalv:ci .
