name: Batch Scan Repositories

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force reprocess all repos (ignore previous success)'
        type: boolean
        default: false
      cleanup:
        description: 'Remove cloned repos after successful scan'
        type: boolean
        default: true
      time_limit_minutes:
        description: 'Stop processing after N minutes (default: 350, max: 360)'
        type: number
        default: 350
      repos_root:
        description: 'Base folder for resolving path:<...> entries in repos.txt'
        type: string
        default: '.'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore scan state from cache
        uses: actions/cache/restore@v5
        with:
          path: .data/lidskjalv/state/scan-state.json
          key: scan-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            scan-state-master-

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq maven gradle

      - name: Mask secrets in logs
        run: |
          echo "::add-mask::${{ secrets.SONAR_TOKEN }}"

      - name: Validate local path entries
        run: |
          REPOS_FILE="repos.txt"
          REPOS_ROOT="${{ inputs.repos_root || '.' }}"

          if [ ! -f "$REPOS_FILE" ]; then
            echo "::error::${REPOS_FILE} not found in workspace"
            exit 1
          fi

          HAS_PATHS=false
          while IFS= read -r raw_line; do
            line="$(echo "$raw_line" | sed -E 's/#.*//' | xargs)"
            [ -z "$line" ] && continue
            case "$line" in
              path:*)
                HAS_PATHS=true
                ;;
            esac
          done < "$REPOS_FILE"

          if [ "$HAS_PATHS" != "true" ]; then
            echo "No path: entries detected in repos.txt"
            exit 0
          fi

          echo "Detected path: entries. Resolving from repos root: $REPOS_ROOT"
          if [ ! -d "$REPOS_ROOT" ]; then
            echo "::error::repos_root does not exist: $REPOS_ROOT"
            exit 1
          fi

          MISSING=0
          while IFS= read -r raw_line; do
            line="$(echo "$raw_line" | sed -E 's/#.*//' | xargs)"
            [ -z "$line" ] && continue
            case "$line" in
              path:*)
                path_ref="${line#path:}"
                path_ref="$(echo "$path_ref" | xargs)"
                if [ -z "$path_ref" ]; then
                  echo "::error::Invalid empty path entry: $raw_line"
                  MISSING=1
                  continue
                fi

                if [[ "$path_ref" = /* ]]; then
                  resolved="$path_ref"
                else
                  resolved="$REPOS_ROOT/$path_ref"
                fi

                if [ ! -d "$resolved" ]; then
                  echo "::error::Missing local repository path: $resolved (from: $line)"
                  MISSING=1
                fi
                ;;
            esac
          done < "$REPOS_FILE"

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

          echo "All path entries validated successfully."

      - name: Pre-create projects in SonarCloud (optional)
        continue-on-error: true
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          chmod +x scripts/create-projects.sh
          ROOT="${{ inputs.repos_root || '.' }}"
          ./scripts/create-projects.sh --repos-root "$ROOT"

      - name: Run batch scan
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          WORKFLOW_TIME_LIMIT_MINUTES: ${{ inputs.time_limit_minutes || 350 }}
        run: |
          chmod +x scripts/batch-scan.sh
          ROOT="${{ inputs.repos_root || '.' }}"
          CMD=(./scripts/batch-scan.sh --repos-root "$ROOT")

          if [ "${{ inputs.force || 'false' }}" = "true" ]; then
            CMD+=(--force)
          fi
          if [ "${{ inputs.cleanup || 'true' }}" = "true" ]; then
            CMD+=(--cleanup)
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}" || true

      - name: Upload scan logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-logs
          path: .data/lidskjalv/logs/
          retention-days: 30

      - name: Upload scan state
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-state
          path: .data/lidskjalv/state/scan-state.json
          retention-days: 90

      - name: Save scan state to cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: .data/lidskjalv/state/scan-state.json
          key: scan-state-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Display summary
        if: always()
        run: |
          STATE_FILE=".data/lidskjalv/state/scan-state.json"
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "$STATE_FILE" ]; then
            echo "### Repository Status" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Repository | Status | Cloned | Scanned | Build |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|--------|--------|---------|-------|" >> $GITHUB_STEP_SUMMARY
            
            jq -r '.repositories | to_entries[] | "| \(.key) | \(.value.status) | \(.value.clone_timestamp // "N/A") | \(.value.scan_timestamp // "N/A") | \(.value.build_tool // "N/A") \(.value.jdk_version // "") |"' "$STATE_FILE" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            TOTAL=$(jq '.repositories | length' "$STATE_FILE")
            SUCCESS=$(jq '[.repositories | to_entries[] | select(.value.status == "success")] | length' "$STATE_FILE")
            FAILED=$(jq '[.repositories | to_entries[] | select(.value.status == "failed")] | length' "$STATE_FILE")
            SKIPPED=$(jq '[.repositories | to_entries[] | select(.value.status == "skipped")] | length' "$STATE_FILE")
            
            echo "- Total: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- Successful: $SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "- Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- Skipped: $SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "No scan state file found." >> $GITHUB_STEP_SUMMARY
          fi
